<!DOCTYPE html>
<html>
<head>
    <title>授業選択</title>
</head>
<body>
    <h1>授業選択</h1>
    <ul>
        {% for course in courses %}
            <li>授業名 : {{ course.name }} 開始時間 : {{ course.start_time }}</li>
        {% endfor %}
    </ul>
    <button type="button" onclick="location.href=`{% url 'courses:create' %}`">
        新規授業作成
    </button>
</body>
</html>
