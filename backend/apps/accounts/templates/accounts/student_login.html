<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>生徒ログイン</title>
    </head>
    <body>
        <h1>生徒ログイン</h1>
        <form action="{% url 'accounts:student_login' %}" method="post">
            {% csrf_token %} 
            <label for="id_username">学籍番号(GXXXCXXXX) : </label>
            {{ form.username }}
            {% if form.username.errors %}
                <div class="error">
                    {% for error in form.username.errors %}
                        <p>{{ error }}</p>
                    {% endfor %}
                </div>
            {% endif %}
            <br>
            <br>
            <label for="id_password">パスワード : </label>
            {{ form.password }}
            {% if form.non_field_errors %}
                <div class="error">
                    {% for error in form.non_field_errors %}
                        <p>{{ error }}</p>
                    {% endfor %}
                </div>
            {% endif %}
            <br>
            <br>
            <button type="button" onclick="location.href=`{% url 'accounts:login_account_selection' %}`">
                戻る
            </button>
            <input type="submit" value="ログイン" />
        </form>
    </body>
</html>
