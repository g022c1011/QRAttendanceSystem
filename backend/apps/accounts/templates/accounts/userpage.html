<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>ユーザーページ</title>
    </head>
    <body>
        <h1>ユーザーページ</h1>
        <form method="post">
            {% csrf_token %}
            <label for="id_name">{{ user.username }} でログイン中</label>
            <br>
            <br>
            {% if user.account_type == 'teacher' %}
                <a href="{% url 'courses:select' %}">授業管理ページへ</a>
            {% endif %}
            <br>
            <br>
            <button type="submit" formaction="{% url 'accounts:logout' %}">
                ログアウト
            </button>
        </form>
    </body>
</html>
